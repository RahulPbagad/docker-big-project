version: '3.9'
# Everything under services becomes a separate container.
services:
# 1️⃣ PostgreSQL Container

  postgres-db:
    build:
      context: ./database
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - student-app-network

  #2️⃣ Flask Backend
  flask-api:
    build:
      context: ./backend
    container_name: flask-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://admin:123456@postgres-db:5432/mydatabase
    ports:
      - "5000:5000"
    depends_on:
      - postgres-db
    networks:
      - student-app-network

# 3️⃣ Frontend
  frontend-ui:
    build:
      context: ./frontend
    container_name: frontend-ui
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - flask-api
    networks:
      - student-app-network

# 4️⃣ Prometheus
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./app-monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./app-monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    depends_on:
      - flask-api
      - alertmanager
    networks:
      - student-app-network

# 5️⃣ Alertmanager
  alertmanager:
    image: prom/alertmanager
    container_name: alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./app-monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    networks:
      - student-app-network

# 6️⃣ Grafana
  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: unless-stopped

    ports:
      - "3000:3000"

    depends_on:
      - prometheus

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123

    volumes:
      - grafana-data:/var/lib/grafana

      - ./app-monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources

      - ./app-monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards

      - ./app-monitoring/grafana/dashboards:/var/lib/grafana/dashboards

    networks:
      - student-app-network

# 7️⃣ Node Exporter
  node_exporter:
    image: prom/node-exporter
    container_name: node_exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks:
      - student-app-network

# 8️⃣ cAdvisor
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    ports:
      - "8081:8080"
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - student-app-network

volumes:
  pgdata:
  grafana-data:

networks:
  student-app-network:
    driver: bridge 
